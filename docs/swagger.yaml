        Crea un nuevo empleado asociado a un negocio.
        El `profile_id` es opcional (el empleado puede no estar registrado en la app aún).

        **Acceso:** Privado – Solo el propietario del negocio (ownership validado en el servicio)
      operationId: createEmployee
      security:

                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Service'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /services/{id}:
    put:
      tags: [Services]
      summary: Actualizar un servicio
      description: |
        Actualiza un servicio existente. Todos los campos son opcionales.
        Requiere `?businessId` como query param para validar el contexto multi-tenant.

        **Acceso:** Privado – Solo el propietario del negocio
      operationId: updateService
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID del servicio
          schema:
            type: string
            format: uuid
        - name: businessId
          in: query
          required: true
          description: UUID del negocio (contexto multi-tenant)
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                description:
                  type: string
                  maxLength: 500
                  nullable: true
                price:
                  type: number
                  format: double
                  minimum: 0
                duration_minutes:
                  type: integer
                  minimum: 1
                is_active:
                  type: boolean
            example:
              price: 30.00
              name: "Corte Premium"
      responses:
        '200':
          description: Servicio actualizado exitosamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Service'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Services]
      summary: Eliminar un servicio
      description: |
        Desactiva (soft delete) o elimina permanentemente un servicio.
        - **Soft delete** (default): Cambia `is_active` a `false`.
        - **Hard delete**: Agrega `?hard=true` al query. Fallará si el servicio
          tiene citas activas asociadas (FK ON DELETE RESTRICT).

        Requiere `?businessId` como query param.

        **Acceso:** Privado – Solo el propietario del negocio
      operationId: deleteService
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID del servicio
          schema:
            type: string
            format: uuid
        - name: businessId
          in: query
          required: true
          description: UUID del negocio (contexto multi-tenant)
          schema:
            type: string
            format: uuid
        - name: hard
          in: query
          required: false
          description: "`true` para hard delete permanente. Default: soft delete."
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        '200':
          description: Servicio eliminado/desactivado exitosamente
          content:
            application/json:
              example:
                success: true
                message: "Servicio eliminado correctamente."
                data: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: No se puede eliminar porque tiene citas activas asociadas
          content:
            application/json:
              example:
                success: false
                message: "No se puede eliminar el servicio porque tiene citas activas asociadas"

  # ─────────────────────────────────────────────────────────────────────────────
  # 🕒 SCHEDULES
  # ─────────────────────────────────────────────────────────────────────────────
  /schedules:
    post:
      tags: [Schedules]
      summary: Crear un horario laboral
      description: |
        Crea un bloque de horario laboral para un empleado de un negocio.

        **Validaciones:**
        - `day_of_week`: 0 (Domingo) a 6 (Sábado)
        - `start_time` y `end_time`: Formato HH:MM (24h)
        - `end_time` debe ser posterior a `start_time`
        - Se validan solapamientos con horarios existentes del mismo empleado

        **Acceso:** Privado – Solo el propietario del negocio
      operationId: createSchedule
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - business_id
                - employee_id
                - day_of_week
                - start_time
                - end_time
              properties:
                business_id:
                  type: string
                  format: uuid
                  description: UUID del negocio
                employee_id:
                  type: string
                  format: uuid
                  description: UUID del empleado
                day_of_week:
                  type: integer
                  minimum: 0
                  maximum: 6
                  description: "Día de la semana (0=Domingo, 1=Lunes, ..., 6=Sábado)"
                  example: 1
                start_time:
                  type: string
                  pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
                  description: Hora de inicio en formato HH:MM (24h)
                  example: "09:00"
                end_time:
                  type: string
                  pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
                  description: Hora de fin en formato HH:MM (24h)
                  example: "18:00"
                is_active:
                  type: boolean
                  default: true
            example:
              business_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              employee_id: "b2c3d4e5-f6a7-8901-bcde-f23456789012"
              day_of_week: 1
              start_time: "09:00"
              end_time: "18:00"
      responses:
        '201':
          description: Horario creado exitosamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Schedule'
              example:
                success: true
                message: "Horario creado correctamente."
                data:
                  id: "d4e5f6a7-b8c9-0123-defa-456789012345"
                  business_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  employee_id: "b2c3d4e5-f6a7-8901-bcde-f23456789012"
                  day_of_week: 1
                  start_time: "09:00"
                  end_time: "18:00"
                  is_active: true
                  created_at: "2026-06-17T16:00:00Z"
                  updated_at: "2026-06-17T16:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Solapamiento con un horario existente
          content:
            application/json:
              example:
                success: false
                message: "El horario se solapa con un bloque existente del mismo empleado"


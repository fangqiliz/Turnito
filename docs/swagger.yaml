  /appointments/{id}/status:
    put:
      tags: [Appointments]
      summary: Cambiar estado de una cita
      description: |
        Actualiza el estado de una cita siguiendo el flujo de gestión del negocio.

        **Transiciones válidas:**
        | Estado Actual | → Estados Permitidos |
        |---|---|
        | `pending` | `confirmed`, `cancelled` |
        | `confirmed` | `completed`, `no_show`, `cancelled` |

        **Estados finales (no modificables):** `completed`, `no_show`, `cancelled`

        Requiere `?businessId` como query param.

        **Acceso:** Privado – Dueño o empleado del negocio
      operationId: updateAppointmentStatus
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID de la cita
          schema:
            type: string
            format: uuid
        - name: businessId
          in: query
          required: true
          description: UUID del negocio (contexto multi-tenant)
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [pending, confirmed, cancelled, completed, no_show]
                  description: Nuevo estado de la cita
                  example: "confirmed"
            example:
              status: "confirmed"
      responses:
        '200':
          description: Estado actualizado exitosamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Appointment'
              example:
                success: true
                message: 'Estado de la cita actualizado a "confirmed".'
                data:
                  id: "e5f6a7b8-c9d0-1234-efab-567890123456"
                  business_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  status: "confirmed"
                  start_time: "2026-06-20T10:00:00Z"
                  end_time: "2026-06-20T10:30:00Z"
                  client_name: "María García"
                  client_email: "maria@ejemplo.com"
                  updated_at: "2026-06-17T17:00:00Z"
        '400':
          description: Transición de estado no permitida
          content:
            application/json:
              example:
                success: false
                message: "Transición de estado no válida: no se puede pasar de 'completed' a 'pending'"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /appointments/{id}:
    delete:
      tags: [Appointments]
      summary: Cancelar una cita
      description: |
        Cancela una cita (soft delete – cambia el estado a `cancelled`).
        - **Clientes:** Solo pueden cancelar sus propias citas futuras.
        - **Staff del negocio:** Pueden cancelar cualquier cita del negocio.

        Requiere `?businessId` como query param.

        **Acceso:** Privado – Usuario autenticado (cliente o staff)
      operationId: cancelAppointment
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID de la cita
          schema:
            type: string
            format: uuid
        - name: businessId
          in: query
          required: true
          description: UUID del negocio (contexto multi-tenant)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cita cancelada exitosamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Appointment'
              example:
                success: true
                message: "Cita cancelada correctamente."
                data:
                  id: "e5f6a7b8-c9d0-1234-efab-567890123456"
                  status: "cancelled"
                  updated_at: "2026-06-17T17:30:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: El cliente no puede cancelar citas de otros usuarios
          content:
            application/json:
              example:
                success: false
                message: "No tienes permisos para cancelar esta cita"
        '404':
          $ref: '#/components/responses/NotFound'

      tags: [Businesses]
      summary: Crear un nuevo negocio
      description: |
        Registra un nuevo negocio (tenant) en la plataforma.
        El slug se genera automáticamente a partir del nombre si no se proporciona.

        **Acceso:** Privado – Solo usuarios con rol `admin` en Supabase Auth
      operationId: createBusiness
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  description: Nombre del negocio
                  example: "Barbería El Corte"
                description:
                  type: string
                  maxLength: 500
                  nullable: true
                  description: Descripción breve del negocio
                  example: "La mejor barbería de la ciudad"
                phone:
                  type: string
                  maxLength: 20
                  nullable: true
                  description: Teléfono de contacto
                  example: "+1-809-555-0100"
                address:
                  type: string
                  maxLength: 255
                  nullable: true
                  description: Dirección física
                  example: "Av. 27 de Febrero #123, Santo Domingo"
                logo_url:
                  type: string
                  format: uri
                  nullable: true
                  description: URL del logotipo
                  example: "https://ejemplo.com/logo.png"
                slug:
                  type: string
                  minLength: 2
                  maxLength: 100
                  pattern: "^[a-z0-9-]+$"
                  description: URL-safe slug (se genera del nombre si no se proporciona)
                  example: "barberia-el-corte"
            example:
              name: "Barbería El Corte"
              description: "La mejor barbería de la ciudad"
              phone: "+1-809-555-0100"
              address: "Av. 27 de Febrero #123, Santo Domingo"
              logo_url: "https://ejemplo.com/logo.png"

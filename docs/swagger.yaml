  # ─────────────────────────────────────────────────────────────────────────────
  # 💇 SERVICES
  # ─────────────────────────────────────────────────────────────────────────────
  /services:
    post:
      tags: [Services]
      summary: Crear un nuevo servicio
      description: |
        Crea un nuevo servicio para un negocio.

        **Acceso:** Privado – Solo el propietario del negocio (ownership validado en el servicio)
      operationId: createService
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - business_id
                - name
                - price
                - duration_minutes
              properties:
                business_id:
                  type: string
                  format: uuid
                  description: UUID del negocio
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  description: Nombre del servicio
                  example: "Corte Clásico"
                description:
                  type: string
                  maxLength: 500
                  nullable: true
                  description: Descripción del servicio
                  example: "Corte de cabello tradicional con navaja"
                price:
                  type: number
                  format: double
                  minimum: 0
                  description: Precio del servicio (hasta 2 decimales)
                  example: 25.00
                duration_minutes:
                  type: integer
                  minimum: 1
                  description: Duración en minutos
                  example: 30
                is_active:
                  type: boolean
                  default: true
                  description: Estado activo del servicio
            example:
              business_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              name: "Corte Clásico"
              description: "Corte de cabello tradicional con navaja"
              price: 25.00
              duration_minutes: 30
      responses:
        '201':
          description: Servicio creado exitosamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Service'
              example:
                success: true
                message: "Servicio creado correctamente."
                data:
                  id: "c3d4e5f6-a7b8-9012-cdef-345678901234"
                  business_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  name: "Corte Clásico"
                  description: "Corte de cabello tradicional con navaja"
                  price: 25.00
                  duration_minutes: 30
                  is_active: true
                  created_at: "2026-06-17T15:30:00Z"
                  updated_at: "2026-06-17T15:30:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /services/business/{id}:

              properties:
                business_id:
                  type: string
                  format: uuid
                  description: UUID del negocio al que pertenece el empleado
                profile_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: UUID del perfil del usuario (opcional)
                full_name:
                  type: string
                  minLength: 2
                  maxLength: 100
